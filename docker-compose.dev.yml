version: '3.8'

services:
  # Base services are inherited from docker-compose.yml
  # This file only adds DEV specific services (Splunk, Ollama) and overrides

  splunk:
    image: splunk/splunk:latest
    container_name: devops-splunk-dev
    environment:
      - SPLUNK_START_ARGS=--accept-license
      - SPLUNK_PASSWORD=adminpassword
    ports:
      - "8000:8000"
      - "8089:8089"
    networks:
      - devops-network

  ollama:
    image: ollama/ollama:latest
    container_name: devops-ollama-dev
    # We mount a volume to persist downloaded models so it doesn't download every time
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - devops-network
    # A lightweight model will be used: qwen2.5-coder:0.5b
    # This requires an entrypoint override to automatically pull the model if it doesn't exist
    entrypoint: >
      /bin/sh -c "
      ollama serve &
      sleep 5 &&
      ollama pull qwen2.5-coder:0.5b &&
      wait
      "

volumes:
  ollama_data:

# Networks definition is inherited from the base docker-compose.yml


