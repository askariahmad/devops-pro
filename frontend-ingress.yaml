apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-pro-ingress
  annotations:
    cert-manager.io/cluster-issuer: selfsigned-issuer
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Adjust proxy buffer size to handle authentication headers
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
    nginx.ingress.kubernetes.io/proxy-busy-buffers-size: "256k"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - devops-pro-ui-prod.centralindia.cloudapp.azure.com
    secretName: devops-pro-ui-tls
  rules:
  - host: devops-pro-ui-prod.centralindia.cloudapp.azure.com
    http:
      paths:
      # Route all backend API requests to gateway-service
      - path: /api/v1/
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port:
              number: 8080
      # Route all frontend UI requests to dashboard-ui
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dashboard-ui
            port:
              number: 80
