$kind: http-request
name: Create Notification
method: POST
url: '{{baseUrl}}/api/v1/notifications'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: X-Tenant-Id
    value: '{{tenantId}}'
body:
  type: json
  content: |-
    {
      "title": "New Issue Detected",
      "message": "A HIGH severity issue was found in org/repo1",
      "type": "ERROR"
    }
