$kind: http-request
name: Add Jira Comment
method: POST
url: '{{baseUrl}}/api/v1/incidents/:id/jira/comments'
order: 9000
headers:
  - key: Content-Type
    value: application/json
  - key: X-Tenant-Id
    value: '{{tenantId}}'
pathVariables:
  - key: id
    value: '{{incidentId}}'
body:
  type: json
  content: |-
    {
      "body": "This issue has been reviewed and assigned."
    }
