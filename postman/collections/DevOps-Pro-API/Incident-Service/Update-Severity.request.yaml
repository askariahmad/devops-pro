$kind: http-request
name: Update Severity
method: PATCH
url: '{{baseUrl}}/api/v1/incidents/:id/severity'
order: 6000
headers:
  - key: Content-Type
    value: application/json
  - key: X-Tenant-Id
    value: '{{tenantId}}'
pathVariables:
  - key: id
    value: '{{incidentId}}'
body:
  type: json
  content: |-
    {
      "severity": "CRITICAL"
    }
