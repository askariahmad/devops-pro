$kind: http-request
name: Create Incident
method: POST
url: '{{baseUrl}}/api/v1/incidents'
order: 1000
headers:
  - key: Content-Type
    value: application/json
  - key: X-Tenant-Id
    value: '{{tenantId}}'
body:
  type: json
  content: |-
    {
      "title": "SQL Injection vulnerability detected",
      "severity": "HIGH",
      "repository": "org/repo1",
      "why": "Unsanitized user input passed to SQL query",
      "howToFix": "Use parameterized queries"
    }
